<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pago Exitoso! | Luxnova Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .success-card { background: white; padding: 50px 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; max-width: 500px; width: 90%; }
        .icon-circle { width: 80px; height: 80px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; }
        .icon-circle svg { width: 40px; height: 40px; stroke: #2563eb; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        h1 { color: #0f172a; font-size: 2rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -0.5px; }
        p { color: #64748b; font-size: 1.05rem; line-height: 1.6; margin-bottom: 30px; }
        .details-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 30px; text-align: left; }
        .details-box p { margin: 0 0 10px 0; font-size: 0.95rem; color: #334155; }
        .details-box p:last-child { margin: 0; }
        .details-box strong { color: #0f172a; font-weight: 600; }
        .btn-home { display: inline-block; background: #0f172a; color: white; text-decoration: none; padding: 16px 30px; border-radius: 12px; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-home:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15); }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon-circle">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1>¡Pago procesado con éxito!</h1>
        <p>Tu orden ha sido confirmada y nuestro equipo ya está preparándola para el despacho. Te hemos enviado un comprobante a tu correo electrónico.</p>
        
        <div class="details-box">
            <p><strong>Estado:</strong> Aprobado y Verificado</p>
            <p><strong>Garantía:</strong> Activa (Compra Protegida)</p>
        </div>

        <a href="/" class="btn-home">Volver a la tienda</a>
    </div>
</body>
</html>
