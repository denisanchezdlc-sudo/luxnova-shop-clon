<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Fallido | Luxnova Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-card { background: white; padding: 50px 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; max-width: 500px; width: 90%; }
        .icon-circle { width: 80px; height: 80px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; }
        .icon-circle svg { width: 40px; height: 40px; stroke: #ef4444; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        h1 { color: #0f172a; font-size: 2rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -0.5px; }
        p { color: #64748b; font-size: 1.05rem; line-height: 1.6; margin-bottom: 30px; }
        .btn-home { display: inline-block; background: #0f172a; color: white; text-decoration: none; padding: 16px 30px; border-radius: 12px; font-weight: 600; transition: transform 0.2s; }
        .btn-home:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15); }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon-circle">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
        <h1>El pago no pudo procesarse</h1>
        <p>Tu tarjeta fue rechazada o cancelaste la operación. No se ha realizado ningún cargo a tu cuenta.</p>
        <a href="/" class="btn-home">Volver a intentar</a>
    </div>
</body>
</html>
